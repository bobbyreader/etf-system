<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E大长赢 · 150份计划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0c0d10;
    --bg-surface: #13141a;
    --bg-card: #191b22;
    --bg-card-hover: #1f2128;
    --bg-input: #1c1e25;
    --border: rgba(255,255,255,0.055);
    --border-bright: rgba(255,255,255,0.11);
    --text-primary: #e8e2d6;
    --text-secondary: #8a8278;
    --text-muted: #4a4844;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.13);
    --gold-glow: rgba(201,168,76,0.07);
    --buy: #2dd4a0;
    --buy-dim: rgba(45,212,160,0.11);
    --sell: #f06c6c;
    --sell-dim: rgba(240,108,108,0.11);
    --hold: #c9a84c;
    --hold-dim: rgba(201,168,76,0.09);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.11);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Outfit', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

  /* ── Layout ── */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 64px;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,13,16,0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--gold) 0%, #8b6914 100%);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: #0c0d10;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 16px rgba(201,168,76,0.25);
  }

  .logo-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .logo-text span {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 400;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--buy);
    border-radius: 50%;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(45,212,160,0.4); }
    50% { opacity: 0.6; transform: scale(0.88); box-shadow: 0 0 0 4px rgba(45,212,160,0); }
  }

  .last-update {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .refresh-btn {
    width: 36px;
    height: 36px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.22s;
  }

  .refresh-btn:hover {
    background: var(--bg-card-hover);
    color: var(--gold);
    border-color: var(--border-bright);
  }

  .refresh-btn.loading svg {
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Market Bar ── */
  .market-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .stat-card:nth-child(1) { animation-delay: 0.04s; }
  .stat-card:nth-child(2) { animation-delay: 0.08s; }
  .stat-card:nth-child(3) { animation-delay: 0.12s; }
  .stat-card:nth-child(4) { animation-delay: 0.16s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .stat-value.buy { color: var(--buy); }
  .stat-value.sell { color: var(--sell); }
  .stat-value.hold { color: var(--hold); }
  .stat-value.neutral { color: var(--text-primary); }

  .stat-sub {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Section Header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: '';
    display: block;
    width: 3px;
    height: 20px;
    background: linear-gradient(180deg, var(--gold), #8b6914);
    border-radius: 2px;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 3px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
  }

  .tab-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .tab-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }

  .tab-btn:hover:not(.active) {
    color: var(--text-primary);
  }

  /* ── Signals Grid ── */
  .signals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .signal-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .signal-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: var(--radius);
  }

  .signal-card:hover {
    background: var(--bg-card);
    border-color: var(--border-bright);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }

  .signal-card:hover::before { opacity: 1; }

  .signal-card.buy {
    border-color: rgba(45,212,160,0.13);
  }
  .signal-card.buy::before {
    background: linear-gradient(135deg, rgba(45,212,160,0.04) 0%, transparent 60%);
  }

  .signal-card.sell {
    border-color: rgba(240,108,108,0.13);
  }
  .signal-card.sell::before {
    background: linear-gradient(135deg, rgba(240,108,108,0.04) 0%, transparent 60%);
  }

  .signal-card.hold {
    border-color: rgba(201,168,76,0.10);
  }

  .signal-card.selected {
    border-color: var(--gold) !important;
    box-shadow: 0 0 0 1px var(--gold), 0 12px 40px rgba(201,168,76,0.08) !important;
  }

  .signal-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .signal-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .signal-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .action-badge {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }

  .action-badge.buy { background: var(--buy-dim); color: var(--buy); }
  .action-badge.sell { background: var(--sell-dim); color: var(--sell); }
  .action-badge.hold { background: var(--hold-dim); color: var(--hold); }

  .signal-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .metric { display: flex; flex-direction: column; gap: 2px; }

  .metric-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.8px;
  }

  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .metric-value.score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
  }

  .score-bar-wrap {
    height: 3px;
    background: var(--bg-input);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
  }

  .score-bar.low { background: linear-gradient(90deg, var(--buy), #1fa87e); }
  .score-bar.mid { background: linear-gradient(90deg, var(--buy), var(--hold)); }
  .score-bar.high { background: linear-gradient(90deg, var(--hold), var(--sell)); }

  .signal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .signal-intensity { font-size: 11px; color: var(--text-secondary); }

  .signal-shares {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
    opacity: 0.85;
  }

  .ma-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 10px;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .ma-tag.high { background: rgba(240,108,108,0.1); color: var(--sell); }
  .ma-tag.low { background: var(--buy-dim); color: var(--buy); }
  .ma-tag.neutral { background: var(--blue-dim); color: var(--blue); }

  /* ── Detail Panel ── */
  .detail-panel {
    background: var(--bg-surface);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
    display: none;
    animation: fadeUp 0.3s ease forwards;
  }

  .detail-panel.visible { display: block; }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 23px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .detail-close {
    width: 32px;
    height: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .detail-close:hover { color: var(--text-primary); border-color: var(--border-bright); }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .detail-stat {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }

  .detail-stat-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 6px;
  }

  .detail-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .detail-stat-value.gold { color: var(--gold); font-size: 20px; }

  .detail-hist {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 14px;
  }

  .detail-hist-title {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 10px;
  }

  .detail-hist-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    padding: 2px 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .detail-hist-row span:first-child { color: var(--text-muted); }

  .detail-ma {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ma-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }

  .ma-pill strong { font-family: 'JetBrains Mono', monospace; }

  /* ── Portfolio ── */
  .portfolio-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 32px;
  }

  .portfolio-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  .pnl-big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px;
    font-weight: 500;
    line-height: 1;
    margin: 10px 0 8px;
    letter-spacing: -1px;
  }

  .pnl-big.positive { color: var(--buy); }
  .pnl-big.negative { color: var(--sell); }
  .pnl-big.zero { color: var(--text-secondary); }

  .position-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.35s ease forwards;
  }

  .position-row:last-child { border-bottom: none; }

  .position-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 500;
  }

  .position-meta { text-align: right; }

  .position-shares {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .position-pnl { font-size: 11px; margin-top: 2px; }
  .position-pnl.pos { color: var(--buy); }
  .position-pnl.neg { color: var(--sell); }

  /* ── Grid Status ── */
  .grid-section {
    margin-bottom: 32px;
  }

  .grid-levels {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .grid-level {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }

  .grid-level.filled {
    background: var(--buy-dim);
    border-color: rgba(45,212,160,0.2);
    color: var(--buy);
  }

  .grid-level .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .grid-level.filled .dot { background: var(--buy); }

  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-card) 50%, var(--bg-surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    border-radius: var(--radius);
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card { height: 196px; }

  /* ── Empty ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(90px);
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    padding: 10px 22px;
    font-size: 13px;
    color: var(--text-primary);
    box-shadow: 0 8px 40px rgba(0,0,0,0.45);
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Execute Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    width: 100%;
    max-width: 540px;
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-tabs {
    display: flex;
    padding: 12px 24px 0;
    gap: 0;
  }

  .modal-tab {
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .modal-tab.active { color: var(--text-primary); border-bottom-color: var(--gold); }
  .modal-tab:hover:not(.active) { color: var(--text-primary); }

  .modal-tab.buy-tab.active { border-bottom-color: var(--buy); }
  .modal-tab.sell-tab.active { border-bottom-color: var(--sell); }

  .modal-body {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-summary {
    display: flex;
    justify-content: space-between;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 12px;
  }

  .modal-summary .cash { color: var(--text-secondary); }
  .modal-summary .cash strong { color: var(--gold); font-family: 'JetBrains Mono', monospace; }
  .modal-summary .date { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .trade-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .trade-item:last-child { border-bottom: none; }

  .trade-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 500;
    min-width: 90px;
  }

  .trade-action {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 6px;
  }

  .trade-action.buy { background: var(--buy-dim); color: var(--buy); }
  .trade-action.sell { background: var(--sell-dim); color: var(--sell); }

  .trade-stepper {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stepper-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border-bright);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }

  .stepper-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .stepper-btn.buy-btn:hover { color: var(--buy); border-color: var(--buy); }
  .stepper-btn.sell-btn:hover { color: var(--sell); border-color: var(--sell); }

  .stepper-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    min-width: 28px;
    text-align: center;
    color: var(--text-primary);
  }

  .trade-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .trade-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 60px;
    text-align: right;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-ghost {
    background: transparent;
    border-color: var(--border-bright);
    color: var(--text-secondary);
  }

  .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-bright); background: var(--bg-card); }

  .btn-primary {
    background: var(--gold);
    color: #0c0d10;
    border-color: var(--gold);
  }

  .btn-primary:hover { background: #d4b356; box-shadow: 0 4px 16px rgba(201,168,76,0.25); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-buy {
    background: var(--buy);
    color: #0c0d10;
    border-color: var(--buy);
  }

  .btn-buy:hover { background: #3ee0b0; box-shadow: 0 4px 16px rgba(45,212,160,0.25); }
  .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sell {
    background: var(--sell);
    color: #fff;
    border-color: var(--sell);
  }

  .btn-sell:hover { background: #f57c7c; box-shadow: 0 4px 16px rgba(240,108,108,0.25); }
  .btn-sell:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-success { color: var(--buy); font-size: 13px; margin-bottom: 8px; }
  .result-error { color: var(--sell); font-size: 13px; margin-bottom: 8px; }

  .execute-btn {
    padding: 8px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    color: var(--gold);
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .execute-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

  .portfolio-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .app { padding: 0 16px 48px; }
    .market-bar { grid-template-columns: repeat(2, 1fr); }
    .signals-grid { grid-template-columns: 1fr; }
    .portfolio-section { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 480px) {
    .header-inner { gap: 10px; }
    .logo-text span { display: none; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .market-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">E</div>
        <div class="logo-text">
          <h1>E大长赢 · 150份计划</h1>
          <span>ETF Investment System</span>
        </div>
      </div>
      <div class="header-right">
        <div class="live-badge">
          <div class="live-dot"></div>
          <span>Live</span>
        </div>
        <div class="last-update" id="lastUpdate">--:--:--</div>
        <button class="refresh-btn" id="refreshBtn" title="刷新数据">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Market Summary -->
  <div class="market-bar" id="marketBar">
    <div class="stat-card skeleton-card"></div>
    <div class="stat-card skeleton-card"></div>
    <div class="stat-card skeleton-card"></div>
    <div class="stat-card skeleton-card"></div>
  </div>

  <!-- Signals -->
  <div class="section-header">
    <h2 class="section-title">实时信号</h2>
    <div class="tab-bar">
      <button class="tab-btn active" data-filter="all">全部</button>
      <button class="tab-btn" data-filter="BUY">买入</button>
      <button class="tab-btn" data-filter="HOLD">持有</button>
      <button class="tab-btn" data-filter="SELL">卖出</button>
    </div>
  </div>

  <div class="signals-grid" id="signalsGrid">
    <div class="signal-card skeleton-card"></div>
    <div class="signal-card skeleton-card"></div>
    <div class="signal-card skeleton-card"></div>
    <div class="signal-card skeleton-card"></div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 class="detail-title" id="detailTitle">—</h3>
      <button class="detail-close" onclick="closeDetail()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="detail-grid" id="detailGrid"></div>
    <div class="detail-hist">
      <div class="detail-hist-title">历史分位（10年滚动窗口）</div>
      <div id="detailHistRows"></div>
    </div>
    <div class="detail-ma" id="detailMA"></div>
  </div>

  <!-- Execute Modal -->
<div class="modal-overlay" id="executeModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">执行计划</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab buy-tab active" data-tab="buy" onclick="switchModalTab('buy')">买入</button>
      <button class="modal-tab sell-tab" data-tab="sell" onclick="switchModalTab('sell')">卖出</button>
    </div>
    <div class="modal-body">
      <div class="modal-summary">
        <span class="cash">可用: <strong id="modalCash">—</strong> 份</span>
        <span class="date" id="modalDate">—</span>
      </div>
      <div id="tradeList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="executeBtn" onclick="doExecute()" disabled>确认执行</button>
    </div>
  </div>
</div>

  <!-- Portfolio -->
  <div class="section-header">
    <h2 class="section-title">持仓状态</h2>
    <button class="execute-btn" onclick="openModal('buy')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      录入操作
    </button>
  </div>

  <div class="portfolio-section">
    <div class="portfolio-card">
      <div class="stat-label">总浮盈亏</div>
      <div class="pnl-big zero" id="totalPnl">—</div>
      <div class="stat-sub" id="totalPnlPct">暂无持仓数据</div>
    </div>
    <div class="portfolio-card">
      <div class="stat-label">持仓明细</div>
      <div id="positionsList">
        <div class="empty-state">空空如也，尚未建仓</div>
      </div>
    </div>
  </div>

  <!-- Grid Status -->
  <div class="grid-section">
    <div class="section-header">
      <h2 class="section-title">华宝油气网格</h2>
    </div>
    <div class="portfolio-card">
      <div class="stat-label">10层 · 每格5%间距</div>
      <div class="grid-levels" id="gridLevels"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let allSignals = [];
  let selectedName = null;
  let currentFilter = 'all';

  // ── Utils ──
  function $(sel) { return document.querySelector(sel); }
  function $$(sel) { return document.querySelectorAll(sel); }

  function fmt(v, d = 2) {
    if (v === null || v === undefined || v === '') return '—';
    return typeof v === 'number' ? v.toFixed(d) : v;
  }

  function fmtPnl(v) {
    if (v > 0) return `+${v.toFixed(2)}万`;
    if (v < 0) return `${v.toFixed(2)}万`;
    return '0.00万';
  }

  function showToast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function scoreColor(pct) {
    if (pct <= 30) return 'low';
    if (pct <= 70) return 'mid';
    return 'high';
  }

  function actionLabel(action) {
    return {BUY:'买入', HOLD:'持有', SELL:'卖出'}[action] || action;
  }

  function barWidth(pct) {
    if (pct === null || isNaN(pct)) return 50;
    return Math.min(100, Math.max(1, pct));
  }

  function maZone(zone) {
    if (!zone) return {cls:'neutral', icon:'↔'};
    if (zone === '高位预警') return {cls:'high', icon:'⚠'};
    if (zone === '低位机会') return {cls:'low', icon:'✓'};
    return {cls:'neutral', icon:'↔'};
  }

  // ── Render Market Bar ──
  function renderMarketBar(summary) {
    const avg = summary.avg_pct;
    const avgCls = avg <= 30 ? 'buy' : avg <= 70 ? 'neutral' : 'sell';
    const avgLabel = avg <= 30 ? '低估' : avg <= 70 ? '中性' : '高估';

    $('#marketBar').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">市场综合分位</div>
        <div class="stat-value ${avgCls}">${avg.toFixed(1)}%</div>
        <div class="stat-sub">${avgLabel}区间</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">买入信号</div>
        <div class="stat-value buy">${summary.buy}</div>
        <div class="stat-sub">${(summary.buy_names||[]).slice(0,2).join(' / ') || '无'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">卖出信号</div>
        <div class="stat-value sell">${summary.sell}</div>
        <div class="stat-sub">${(summary.sell_names||[]).slice(0,2).join(' / ') || '无'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">监控品种</div>
        <div class="stat-value neutral">${summary.total}</div>
        <div class="stat-sub">全量品种</div>
      </div>
    `;
  }

  // ── Render Signals ──
  function renderSignals(signals) {
    const filtered = currentFilter === 'all'
      ? signals
      : signals.filter(s => s.action === currentFilter);

    if (filtered.length === 0) {
      $('#signalsGrid').innerHTML = `<div class="empty-state">暂无${currentFilter === 'all' ? '' : actionLabel(currentFilter)}信号</div>`;
      return;
    }

    $('#signalsGrid').innerHTML = filtered.map((s, i) => {
      const pct = s.pct || 50;
      const barClass = scoreColor(pct);
      const actionClass = s.action.toLowerCase();
      const isSelected = s.name === selectedName;
      const ma = s.ma_trend;
      const maInfo = maZone(ma ? ma.zone : null);

      return `
      <div class="signal-card ${actionClass}${isSelected ? ' selected' : ''}"
           style="animation-delay:${i * 0.04}s"
           onclick="selectSignal('${s.name.replace(/'/g,"\\'")}')">
        <div class="signal-card-header">
          <div>
            <div class="signal-name">${s.name}</div>
            <div class="signal-code">${s.code}</div>
          </div>
          <span class="action-badge ${actionClass}">${actionLabel(s.action)}</span>
        </div>
        <div class="signal-metrics">
          <div class="metric">
            <div class="metric-label">PE-TTM</div>
            <div class="metric-value">${fmt(s.pe_ttm) || '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">PB</div>
            <div class="metric-value">${fmt(s.pb) || '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">价格</div>
            <div class="metric-value">${s.price != null ? fmt(s.price, 3) : '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">综合分位</div>
            <div class="metric-value score">${s.score}</div>
            <div class="score-bar-wrap">
              <div class="score-bar ${barClass}" style="width:${barWidth(pct)}%"></div>
            </div>
          </div>
        </div>
        ${ma ? `<span class="ma-tag ${maInfo.cls}">MA250 ${maInfo.icon} ${ma.zone || '正常区间'} ${ma.deviation > 0 ? '+' : ''}${ma.deviation}%</span>` : ''}
        <div class="signal-footer">
          <span class="signal-intensity">${s.intensity || ''}</span>
          <span class="signal-shares">${s.shares > 0 ? `+${s.shares}份` : ''}</span>
        </div>
      </div>`;
    }).join('');
  }

  // ── Select Signal ──
  function selectSignal(name) {
    selectedName = selectedName === name ? null : name;
    const s = allSignals.find(x => x.name === name);

    renderSignals(allSignals);

    if (!selectedName || !s) {
      closeDetail();
      return;
    }

    const ma = s.ma_trend;
    const maInfo = maZone(ma ? ma.zone : null);

    $('#detailTitle').textContent = `${s.name} (${s.code})`;
    $('#detailGrid').innerHTML = `
      <div class="detail-stat"><div class="detail-stat-label">PE-TTM</div><div class="detail-stat-value">${fmt(s.pe_ttm)||'—'}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">PE分位</div><div class="detail-stat-value">${s.pe_pct||'—'}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">PB</div><div class="detail-stat-value">${fmt(s.pb)||'—'}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">PB分位</div><div class="detail-stat-value">${s.pb_pct||'—'}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">综合分位</div><div class="detail-stat-value gold">${s.score}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">ETF价格</div><div class="detail-stat-value">${s.price != null ? fmt(s.price,3) : '—'}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">操作</div><div class="detail-stat-value" style="color:var(--${s.action==='BUY'?'buy':s.action==='SELL'?'sell':'hold'})">${actionLabel(s.action)}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">最大跌幅</div><div class="detail-stat-value">${s.max_drop||'—'}</div></div>
    `;

    const hist = s.history || {};
    const histRows = [];
    if (hist.pe_min != null) histRows.push(`<div class="detail-hist-row"><span>PE历史最低</span><span>${fmt(hist.pe_min)}</span></div>`);
    if (hist.pe_max != null) histRows.push(`<div class="detail-hist-row"><span>PE历史最高</span><span>${fmt(hist.pe_max)}</span></div>`);
    if (hist.pe_mean != null) histRows.push(`<div class="detail-hist-row"><span>PE历史均值</span><span>${fmt(hist.pe_mean)}</span></div>`);
    histRows.push(`<div class="detail-hist-row" style="margin-top:6px"><span style="font-size:10px">${hist.note||'10年滚动窗口分位'}</span><span></span></div>`);
    $('#detailHistRows').innerHTML = histRows.join('');

    let maHTML = '';
    if (ma) {
      const devColor = ma.deviation >= 20 ? 'var(--sell)' : ma.deviation <= -15 ? 'var(--buy)' : 'var(--text-primary)';
      maHTML = `
        <div class="ma-pill"><span>MA250</span><strong>${fmt(ma.ma_value,3)}</strong></div>
        <div class="ma-pill"><span>偏离度</span><strong style="color:${devColor}">${ma.deviation>0?'+':''}${ma.deviation}%</strong></div>
        <div class="ma-pill"><span>区间</span><strong style="color:${maInfo.cls==='high'?'var(--sell)':maInfo.cls==='low'?'var(--buy)':'var(--blue)'}">${ma.zone||'—'}</strong></div>`;
    }
    $('#detailMA').innerHTML = maHTML;

    $('#detailPanel').classList.add('visible');
    setTimeout(() => {
      const panel = $('#detailPanel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
  }

  function closeDetail() {
    selectedName = null;
    $('#detailPanel').classList.remove('visible');
  }

  // ── Render Portfolio ──
  function renderPortfolio(data) {
    const pnl = data.unrealized_pnl || {};
    const total = pnl.total || 0;
    const totalPct = pnl.pct || 0;

    const pnlEl = $('#totalPnl');
    pnlEl.textContent = fmtPnl(total);
    pnlEl.className = `pnl-big ${total > 0 ? 'positive' : total < 0 ? 'negative' : 'zero'}`;

    const pos = data.positions;
    if (!pos || Object.keys(pos).length === 0) {
      $('#totalPnlPct').textContent = `现金 ${data.cash} 份 / ${data.total_shares} 份`;
      $('#positionsList').innerHTML = `<div class="empty-state">空空如也，尚未建仓</div>`;
      return;
    }

    $('#totalPnlPct').textContent = total !== 0
      ? `${totalPct > 0 ? '+' : ''}${totalPct.toFixed(1)}%`
      : `现金 ${data.cash} 份 / ${data.total_shares} 份`;

    const pnlPosList = pnl.positions || [];
    let html = '';
    for (const [name, posData] of Object.entries(pos)) {
      const pItem = pnlPosList.find(p => p.品种 === name);
      const pnlVal = pItem ? pItem['浮盈亏(万)'] : 0;
      const pnlPct = pItem ? pItem['浮盈亏率'] : 0;
      const cls = pnlVal > 0 ? 'pos' : pnlVal < 0 ? 'neg' : '';
      html += `
        <div class="position-row" style="animation-delay:${Object.keys(pos).indexOf(name) * 0.05}s">
          <span class="position-name">${name}</span>
          <div class="position-meta">
            <div class="position-shares">${posData.shares}份 @ ${fmt(posData.avg_cost,4)}</div>
            <div class="position-pnl ${cls}">${pnlVal !== 0 ? fmtPnl(pnlVal) + ` (${pnlPct>0?'+':''}${pnlPct.toFixed(1)}%)` : '成本价'}</div>
          </div>
        </div>`;
    }
    $('#positionsList').innerHTML = html;
  }

  // ── Render Grid ──
  function renderGrid() {
    // 华宝油气网格参数
    const base = 0.55, spacing = 5, levels = 10;
    let price = base, rows = '';
    for (let i = 1; i <= levels; i++) {
      const trigger = (price * (1 - spacing / 100)).toFixed(4);
      const pct = ((parseFloat(trigger) - base) / base * 100).toFixed(1);
      rows += `<div class="grid-level"><span class="dot"></span>L${i} ${trigger} <span style="opacity:0.5">(${pct}%)</span></div>`;
      price = parseFloat(trigger);
    }
    $('#gridLevels').innerHTML = rows;
  }

  // ── Fetch Data ──
  async function fetchAll() {
    const btn = $('#refreshBtn');
    btn.classList.add('loading');

    try {
      const [statusRes, pfRes] = await Promise.all([
        fetch('/status.json'),
        fetch('/portfolio.json').catch(() => null)
      ]);

      if (!statusRes.ok) throw new Error('API error');

      const status = await statusRes.json();
      const portfolio = pfRes && pfRes.ok ? await pfRes.json() : null;

      allSignals = status.signals || [];

      portfolioData = portfolio || { positions: {}, cash: 150, total_shares: 150, unrealized_pnl: {} };
      modalCash = portfolioData.cash || 150;

      renderMarketBar(status.summary);
      renderSignals(allSignals);
      renderPortfolio(portfolioData);

      const now = new Date();
      $('#lastUpdate').textContent = now.toLocaleTimeString('zh-CN', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

    } catch (e) {
      console.error(e);
      showToast('数据加载失败，请检查网络');
    } finally {
      btn.classList.remove('loading');
    }
  }

  // ── Tab Filters ──
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderSignals(allSignals);
    });
  });

  // ── Modal State ──
  let modalTab = 'buy';
  let modalCash = 150;
  let pendingTrades = {}; // { name: { shares, action, price } }

  function openModal(tab) {
    modalTab = tab;
    pendingTrades = {};
    $$('.modal-tab').forEach(t => t.classList.remove('active'));
    $(`.modal-tab[data-tab="${tab}"]`).classList.add('active');

    // Update button style based on tab
    const execBtn = $('#executeBtn');
    execBtn.className = `btn btn-${tab === 'buy' ? 'buy' : 'sell'}`;

    $('#executeModal').classList.add('visible');
    renderTradeList();
  }

  function closeModal() {
    $('#executeModal').classList.remove('visible');
    pendingTrades = {};
  }

  function switchModalTab(tab) {
    modalTab = tab;
    $$('.modal-tab').forEach(t => t.classList.remove('active'));
    $(`.modal-tab[data-tab="${tab}"]`).classList.add('active');

    const execBtn = $('#executeBtn');
    execBtn.className = `btn btn-${tab === 'buy' ? 'buy' : 'sell'}`;

    renderTradeList();
  }

  function renderTradeList() {
    $('#modalCash').textContent = modalCash;
    const today = new Date();
    $('#modalDate').textContent = today.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});

    const sigs = modalTab === 'buy'
      ? allSignals.filter(s => s.action === 'BUY')
      : allSignals.filter(s => {
          const pos = portfolioData.positions[s.name];
          return s.action === 'SELL' || (pos && pos.shares > 0);
        });

    if (sigs.length === 0) {
      $('#tradeList').innerHTML = `<div class="empty-state">暂无${modalTab === 'buy' ? '买入' : '卖出'}信号</div>`;
      $('#executeBtn').disabled = true;
      return;
    }

    const sig = sigs[0]; // Pre-fill first signal
    if (!pendingTrades[sig.name]) {
      const maxSell = modalTab === 'sell' ? (portfolioData.positions[sig.name]?.shares || 0) : 0;
      const maxBuy = Math.min(modalCash, modalTab === 'buy' ? (sig.shares || 1) * 2 : 0);
      pendingTrades[sig.name] = {
        shares: modalTab === 'buy' ? (sig.shares || 1) : maxSell,
        action: modalTab,
        price: sig.price || 1,
      };
    }

    const trade = pendingTrades[sig.name];
    const price = sig.price || 1;
    const actionLabel = modalTab === 'buy' ? '买入' : '卖出';
    const actionClass = modalTab;

    const maxSell = modalTab === 'sell' ? (portfolioData.positions[sig.name]?.shares || 0) : 999;

    $('#tradeList').innerHTML = `
      <div class="trade-item">
        <div>
          <span class="trade-name">${sig.name}</span>
          <span class="trade-action ${actionClass}">${actionLabel}</span>
          <div class="trade-price">现价 ${price != null ? fmt(price, 3) : '—'}</div>
        </div>
        <div class="trade-stepper">
          <button class="stepper-btn sell-btn" onclick="stepTrade('${sig.name}', -1)" ${trade.shares <= (modalTab === 'buy' ? 0 : 1) ? 'disabled' : ''}>−</button>
          <span class="stepper-val">${trade.shares}</span>
          <button class="stepper-btn buy-btn" onclick="stepTrade('${sig.name}', 1)" ${modalTab === 'buy' && modalCash <= 0 ? 'disabled' : ''}>+</button>
        </div>
      </div>
      <div style="text-align:right;padding:8px 0 0;font-size:12px;color:var(--text-secondary)">
        合计: <strong style="color:var(--gold);font-family:'JetBrains Mono',monospace">${trade.shares}</strong> 份
        ${sig.intensity ? `<span style="margin-left:10px;color:var(--text-muted)">${sig.intensity}</span>` : ''}
      </div>
    `;

    const hasTrade = trade.shares > 0;
    $('#executeBtn').disabled = !hasTrade;
    $('#executeBtn').textContent = hasTrade ? `确认${actionLabel}${trade.shares}份` : `确认${actionLabel}`;
  }

  function stepTrade(name, delta) {
    const trade = pendingTrades[name];
    if (!trade) return;

    const minVal = modalTab === 'buy' ? 0 : 1;
    const maxVal = modalTab === 'buy' ? modalCash : (portfolioData.positions[name]?.shares || 0);

    const newVal = trade.shares + delta;
    if (newVal < minVal || newVal > maxVal) return;

    trade.shares = newVal;
    renderTradeList();
  }

  async function doExecute() {
    const trade = Object.entries(pendingTrades).find(([, t]) => t.shares > 0);
    if (!trade) return;

    const [, t] = trade;
    const execBtn = $('#executeBtn');
    execBtn.disabled = true;
    execBtn.textContent = '执行中...';

    try {
      const payload = modalTab === 'buy'
        ? { buys: [{ name: trade[0], shares: t.shares }] }
        : { sells: [{ name: trade[0], shares: t.shares }] };

      const res = await fetch('/execute.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const result = await res.json();

      if (result.errors && result.errors.length > 0) {
        showToast('执行失败: ' + result.errors[0]);
      } else {
        showToast(`${modalTab === 'buy' ? '买入' : '卖出'}成功！`);
        closeModal();
        fetchAll(); // Refresh all data
      }
    } catch (e) {
      console.error(e);
      showToast('网络错误，请重试');
    } finally {
      execBtn.disabled = false;
      execBtn.textContent = `确认${modalTab === 'buy' ? '买入' : '卖出'}${t.shares}份`;
    }
  }

  // Close modal on overlay click
  $('#executeModal').addEventListener('click', (e) => {
    if (e.target === $('#executeModal')) closeModal();
  });

  // Close modal on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  $('#refreshBtn').addEventListener('click', fetchAll);

  // ── Init ──
  renderGrid();
  fetchAll();
  setInterval(fetchAll, 300000); // 5min auto-refresh
</script>
</body>
</html>
